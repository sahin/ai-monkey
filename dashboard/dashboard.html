<!DOCTYPE html>
<html lang="en" data-i18n-document-title="dashboardPageTitle">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="dashboard.css">
  <title>AI Monkey - Dashboard</title>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="monkey-emoji">&#x1F435;</span>
        <h1 data-i18n="appName">AI Monkey</h1>
        <span id="script-count" class="script-count">0 scripts</span>
      </div>
      <div class="header-center">
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" class="search-input" data-i18n-placeholder="dashboardSearchPlaceholder" placeholder="Search scripts...">
        </div>
      </div>
      <div class="header-right">
        <button id="import-btn" class="btn btn-subtle" data-i18n-title="dashboardImportTitle" title="Import scripts">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span data-i18n="dashboardImportButton">Import</span>
        </button>
        <button id="export-btn" class="btn btn-subtle" data-i18n-title="dashboardExportTitle" title="Export scripts">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span data-i18n="dashboardExportButton">Export</span>
        </button>
        <button id="new-script-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span data-i18n="dashboardNewScriptButton">New Script</span>
        </button>
      </div>
    </header>

    <!-- Nav links -->
    <nav class="nav-bar">
      <a href="#" class="nav-link active" data-page="dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span data-i18n="navDashboard">Dashboard</span>
      </a>
      <a href="#" class="nav-link" data-page="settings/settings.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span data-i18n="navSettings">Settings</span>
      </a>
      <a href="#" class="nav-link" data-page="logs/logs.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span data-i18n="navLogs">Logs</span>
      </a>
    </nav>

    <!-- Script cards container -->
    <main class="main">
      <div id="scripts-grid" class="scripts-grid">
        <!-- Rendered by JS -->
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state" hidden>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <line x1="9" y1="14" x2="15" y2="14"/>
        </svg>
        <h2 data-i18n="dashboardEmptyTitle">No scripts yet</h2>
        <p data-i18n="dashboardEmptyBody">Create your first AI script!</p>
        <button id="empty-create-btn" class="btn btn-primary btn-lg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span data-i18n="dashboardCreateScript">Create Script</span>
        </button>
      </div>

      <!-- No search results -->
      <div id="no-results" class="empty-state" hidden>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <h2 data-i18n="dashboardNoResultsTitle">No matching scripts</h2>
        <p data-i18n="dashboardNoResultsBody">Try a different search term.</p>
      </div>
    </main>

    <!-- Delete confirmation modal -->
    <div id="delete-modal" class="modal-overlay" hidden>
      <div class="modal">
        <h3 class="modal-title" data-i18n="dashboardDeleteTitle">Delete Script</h3>
        <p class="modal-body"><span id="delete-body-prefix"></span><strong id="delete-script-name"></strong><span id="delete-body-suffix"></span></p>
        <div class="modal-actions">
          <button id="delete-cancel" class="btn btn-subtle" data-i18n="commonCancel">Cancel</button>
          <button id="delete-confirm" class="btn btn-danger" data-i18n="commonDelete">Delete</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" hidden></div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file" accept=".json" hidden>
  </div>

  <script src="dashboard.js" type="module"></script>
</body>
</html>
